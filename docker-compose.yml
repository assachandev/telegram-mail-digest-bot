services:
  telegram-mail-bot:
    build: .
    container_name: telegram-mail-bot
    restart: unless-stopped
    env_file: .env
    environment:
      - GMAIL_CREDENTIALS_FILE=/data/credentials.json
      - GMAIL_TOKEN_FILE=/data/gmail_token.json
      - STATE_FILE=/data/state.json
    volumes:
      - ${HOST_DATA_DIR:-./data}:/data
